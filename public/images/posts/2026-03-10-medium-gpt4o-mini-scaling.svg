<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GPT-4o mini Scaling Snapshot</title>
  <desc id="desc">AI product scaling concept illustration with latency and cost axes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="120" y="120" width="1360" height="660" rx="24" fill="#0b1224" stroke="#1f2937" />
  <g stroke="#334155" stroke-width="2">
    <line x1="220" y1="700" x2="1360" y2="700" />
    <line x1="220" y1="700" x2="220" y2="220" />
    <line x1="220" y1="580" x2="1360" y2="580" />
    <line x1="220" y1="460" x2="1360" y2="460" />
    <line x1="220" y1="340" x2="1360" y2="340" />
  </g>
  <path d="M240 660 C 420 620, 520 540, 680 520 C 820 500, 980 420, 1160 330 C 1220 300, 1280 270, 1340 240"
        fill="none" stroke="url(#line)" stroke-width="10" stroke-linecap="round" />
  <g fill="#22d3ee">
    <circle cx="680" cy="520" r="10" />
    <circle cx="960" cy="430" r="10" />
    <circle cx="1180" cy="320" r="10" />
    <circle cx="1340" cy="240" r="10" />
  </g>
  <text x="220" y="90" fill="#e2e8f0" font-size="42" font-family="Helvetica, Arial, sans-serif" font-weight="700">Scaling Laws in Action</text>
  <text x="220" y="760" fill="#94a3b8" font-size="28" font-family="Helvetica, Arial, sans-serif">Product Iteration Speed (fast -&gt; faster)</text>
  <text x="90" y="460" transform="rotate(-90 90,460)" fill="#94a3b8" font-size="28" font-family="Helvetica, Arial, sans-serif">Capability per Cost</text>
  <text x="1130" y="200" fill="#4ade80" font-size="34" font-family="Helvetica, Arial, sans-serif" font-weight="700">GPT-4o mini zone</text>
</svg>
