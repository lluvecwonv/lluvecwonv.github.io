<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .text-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; }
      .text-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
      .text-ko { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-size: 12px; }
      .vm-color { fill: #8B4DB8; }
      .docker-color { fill: #2496ED; }
      .border-vm { stroke: #8B4DB8; stroke-width: 2; }
      .border-docker { stroke: #2496ED; stroke-width: 2; }
      .layer-bg { fill: #f5f5f5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="35" class="text-main" text-anchor="middle" fill="#1a1a1a" font-size="20">Virtual Machine vs Docker</text>

  <!-- LEFT SIDE: Virtual Machine -->
  <g id="vm-section">
    <text x="200" y="70" class="text-main" text-anchor="middle" fill="#8B4DB8">가상 머신 (VM)</text>

    <!-- Hardware -->
    <rect x="80" y="95" width="240" height="40" class="layer-bg" class="border-vm" rx="4"/>
    <text x="200" y="125" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Hardware (CPU, Memory, Disk)</text>

    <!-- Host OS -->
    <rect x="80" y="140" width="240" height="40" fill="#E8D5F2" class="border-vm" rx="4"/>
    <text x="200" y="170" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Host OS (Linux)</text>

    <!-- Hypervisor -->
    <rect x="80" y="185" width="240" height="40" class="vm-color" rx="4"/>
    <text x="200" y="215" class="text-label" text-anchor="middle" fill="white" font-weight="600">Hypervisor (KVM, VirtualBox)</text>

    <!-- Guest OS 1 -->
    <rect x="80" y="230" width="110" height="35" fill="#D4C4E3" class="border-vm" rx="4"/>
    <text x="135" y="253" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Guest OS</text>

    <!-- App 1 -->
    <rect x="80" y="270" width="110" height="35" fill="#C9B5D6" class="border-vm" rx="4"/>
    <text x="135" y="293" class="text-label" text-anchor="middle" fill="white" font-weight="600">App</text>

    <!-- Guest OS 2 -->
    <rect x="210" y="230" width="110" height="35" fill="#D4C4E3" class="border-vm" rx="4"/>
    <text x="265" y="253" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Guest OS</text>

    <!-- App 2 -->
    <rect x="210" y="270" width="110" height="35" fill="#C9B5D6" class="border-vm" rx="4"/>
    <text x="265" y="293" class="text-label" text-anchor="middle" fill="white" font-weight="600">App</text>

    <!-- VM Info -->
    <text x="200" y="340" class="text-ko" text-anchor="middle" fill="#555" font-size="12">각 VM은 완전한 OS를 포함</text>
    <text x="200" y="357" class="text-ko" text-anchor="middle" fill="#8B4DB8" font-weight="600" font-size="13">무겁고 느림</text>
    <text x="200" y="378" class="text-ko" text-anchor="middle" fill="#666" font-size="11">시작 시간: 분 단위</text>
    <text x="200" y="395" class="text-ko" text-anchor="middle" fill="#666" font-size="11">리소스 사용: 높음</text>
  </g>

  <!-- RIGHT SIDE: Docker -->
  <g id="docker-section">
    <text x="600" y="70" class="text-main" text-anchor="middle" fill="#2496ED">Docker 컨테이너</text>

    <!-- Hardware -->
    <rect x="480" y="95" width="240" height="40" class="layer-bg" class="border-docker" rx="4"/>
    <text x="600" y="125" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Hardware (CPU, Memory, Disk)</text>

    <!-- Host OS -->
    <rect x="480" y="140" width="240" height="40" fill="#D4E9F7" class="border-docker" rx="4"/>
    <text x="600" y="170" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Host OS (Linux)</text>

    <!-- Docker Engine -->
    <rect x="480" y="185" width="240" height="40" class="docker-color" rx="4"/>
    <text x="600" y="215" class="text-label" text-anchor="middle" fill="white" font-weight="600">Docker Engine</text>

    <!-- Container 1 -->
    <rect x="480" y="230" width="110" height="75" fill="#87CEEB" class="border-docker" rx="4"/>
    <text x="535" y="250" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Container</text>
    <text x="535" y="270" class="text-ko" text-anchor="middle" fill="#333" font-size="11">(공유 OS)</text>
    <text x="535" y="290" class="text-label" text-anchor="middle" fill="#333" font-weight="600">App</text>

    <!-- Container 2 -->
    <rect x="610" y="230" width="110" height="75" fill="#87CEEB" class="border-docker" rx="4"/>
    <text x="665" y="250" class="text-label" text-anchor="middle" fill="#333" font-weight="600">Container</text>
    <text x="665" y="270" class="text-ko" text-anchor="middle" fill="#333" font-size="11">(공유 OS)</text>
    <text x="665" y="290" class="text-label" text-anchor="middle" fill="#333" font-weight="600">App</text>

    <!-- Docker Info -->
    <text x="600" y="340" class="text-ko" text-anchor="middle" fill="#555" font-size="12">모든 컨테이너가 호스트 OS 공유</text>
    <text x="600" y="357" class="text-ko" text-anchor="middle" fill="#2496ED" font-weight="600" font-size="13">가볍고 빠름</text>
    <text x="600" y="378" class="text-ko" text-anchor="middle" fill="#666" font-size="11">시작 시간: 초 단위</text>
    <text x="600" y="395" class="text-ko" text-anchor="middle" fill="#666" font-size="11">리소스 사용: 낮음</text>
  </g>

  <!-- Bottom comparison table -->
  <g id="comparison">
    <rect x="40" y="420" width="720" height="65" fill="#f0f8ff" stroke="#2496ED" stroke-width="1" rx="4"/>

    <line x1="200" y1="420" x2="200" y2="485" stroke="#ddd" stroke-width="1"/>
    <line x1="360" y1="420" x2="360" y2="485" stroke="#ddd" stroke-width="1"/>
    <line x1="520" y1="420" x2="520" y2="485" stroke="#ddd" stroke-width="1"/>

    <text x="120" y="442" class="text-label" text-anchor="middle" fill="#333" font-weight="600">항목</text>
    <text x="280" y="442" class="text-label" text-anchor="middle" fill="#8B4DB8" font-weight="600">VM</text>
    <text x="440" y="442" class="text-label" text-anchor="middle" fill="#2496ED" font-weight="600">Docker</text>

    <text x="120" y="465" class="text-ko" text-anchor="middle" fill="#555" font-size="11">크기</text>
    <text x="280" y="465" class="text-ko" text-anchor="middle" fill="#555" font-size="11">수 GB</text>
    <text x="440" y="465" class="text-ko" text-anchor="middle" fill="#555" font-size="11">수 MB</text>
  </g>
</svg>