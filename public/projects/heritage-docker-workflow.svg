<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Docker Workflow (Flutter + API)</text>

  <!-- ===== FLOW DIAGRAM ===== -->

  <!-- Step 1: Flutter App -->
  <rect x="30" y="100" width="160" height="100" rx="12" fill="#5C6BC0" filter="url(#shadow)"/>
  <text x="110" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Flutter App</text>
  <text x="110" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C5CAE9">User Request</text>
  <text x="110" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C5CAE9">Image Upload</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="150" x2="230" y2="150" stroke="#90CAF9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#90CAF9">API</text>

  <!-- Step 2: Docker Image -->
  <rect x="230" y="100" width="140" height="100" rx="12" fill="#FF9800" filter="url(#shadow)"/>
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Docker</text>
  <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Image</text>
  <text x="300" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE0B2">Build & Deploy</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="150" x2="420" y2="150" stroke="#90CAF9" stroke-width="2.5"/>
  <text x="395" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#90CAF9">Run</text>

  <!-- Step 3: Docker Container (large box) -->
  <rect x="420" y="80" width="340" height="140" rx="14" fill="url(#containerGrad)" filter="url(#shadow)" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="590" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#90CAF9">(Isolated Execution Environment)</text>

  <!-- Sub-components inside container -->
  <rect x="440" y="100" width="90" height="55" rx="8" fill="#1565C0"/>
  <text x="485" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">API</text>
  <text x="485" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">FastAPI</text>

  <rect x="545" y="100" width="90" height="55" rx="8" fill="#1565C0"/>
  <text x="590" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">DETR</text>
  <text x="590" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">Model</text>

  <rect x="650" y="100" width="90" height="55" rx="8" fill="#1565C0"/>
  <text x="695" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">PyTorch</text>
  <text x="695" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">Engine</text>

  <!-- Container inner description -->
  <text x="590" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD">Python 3.10 + CUDA 11.8 + torchvision</text>

  <!-- Arrow 3 -->
  <line x1="760" y1="150" x2="810" y2="150" stroke="#90CAF9" stroke-width="2.5"/>
  <text x="785" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#90CAF9">Inference</text>

  <!-- Step 4: Results -->
  <rect x="810" y="100" width="160" height="100" rx="12" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="890" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Results</text>
  <text x="890" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C8E6C9">Inference Results</text>
  <text x="890" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C8E6C9">JSON Response</text>

  <!-- Arrow 4 -->
  <line x1="970" y1="150" x2="1020" y2="150" stroke="#90CAF9" stroke-width="2.5"/>
  <text x="995" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#90CAF9">Return</text>

  <!-- Step 5: Display -->
  <rect x="1020" y="100" width="140" height="100" rx="12" fill="#1976D2" filter="url(#shadow)"/>
  <text x="1090" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Display</text>
  <text x="1090" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">BBox Rendering</text>
  <text x="1090" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">Damage Report</text>

  <!-- ===== BOTTOM BOXES ===== -->

  <!-- Request Process Box -->
  <rect x="40" y="290" width="530" height="200" rx="12" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#42A5F5">Request Flow:</text>

  <text x="60" y="355" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">1. Flutter App: Capture/Select Image</text>
  <text x="60" y="385" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">2. HTTP POST to API Server (multipart/form-data)</text>
  <text x="60" y="415" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">3. Docker Container: DETR Model Inference</text>
  <text x="60" y="445" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">4. Return: Bounding Boxes + Damage Classes (JSON)</text>
  <text x="60" y="475" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">5. Flutter App: Visualize BBox on Image</text>

  <!-- Docker Benefits Box -->
  <rect x="620" y="290" width="540" height="200" rx="12" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="640" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4CAF50">Why Docker:</text>

  <text x="640" y="355" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">- PyTorch/DETR/CUDA: Fully Isolated Environment</text>
  <text x="640" y="385" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">- Identical Execution: Local = Staging = Production</text>
  <text x="640" y="415" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">- No Dependency Conflicts Across Services</text>
  <text x="640" y="445" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">- Easy Deployment &amp; Auto-Scaling</text>
  <text x="640" y="475" font-family="Arial, sans-serif" font-size="14" fill="#E0E0E0">- Reproducible Builds via Dockerfile</text>

  <!-- ===== DOCKER ARCHITECTURE DETAIL ===== -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Docker Container Architecture Detail</text>

  <!-- Dockerfile box -->
  <rect x="40" y="565" width="200" height="110" rx="10" fill="#37474F" stroke="#78909C" stroke-width="1"/>
  <text x="140" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#B0BEC5">Dockerfile</text>
  <text x="55" y="614" font-family="monospace" font-size="10" fill="#81D4FA">FROM nvidia/cuda:11.8</text>
  <text x="55" y="632" font-family="monospace" font-size="10" fill="#81D4FA">RUN pip install torch</text>
  <text x="55" y="650" font-family="monospace" font-size="10" fill="#81D4FA">COPY . /app</text>
  <text x="55" y="668" font-family="monospace" font-size="10" fill="#81D4FA">CMD ["uvicorn", ...]</text>

  <!-- Arrow -->
  <text x="265" y="625" font-family="Arial, sans-serif" font-size="12" fill="#90CAF9">docker build</text>
  <line x1="240" y1="620" x2="310" y2="620" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="308,615 318,620 308,625" fill="#90CAF9"/>

  <!-- Image box -->
  <rect x="320" y="565" width="180" height="110" rx="10" fill="#E65100" stroke="#FF8F00" stroke-width="1"/>
  <text x="410" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Docker Image</text>
  <text x="410" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE0B2">Python 3.10</text>
  <text x="410" y="636" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE0B2">PyTorch + CUDA</text>
  <text x="410" y="654" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE0B2">DETR + FastAPI</text>

  <!-- Arrow -->
  <text x="530" y="625" font-family="Arial, sans-serif" font-size="12" fill="#90CAF9">docker run</text>
  <line x1="500" y1="620" x2="570" y2="620" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="568,615 578,620 568,625" fill="#90CAF9"/>

  <!-- Container box -->
  <rect x="580" y="565" width="200" height="110" rx="10" fill="#1565C0" stroke="#42A5F5" stroke-width="1"/>
  <text x="680" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Container</text>
  <text x="680" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">FastAPI :8000</text>
  <text x="680" y="636" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">DETR Inference</text>
  <text x="680" y="654" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#BBDEFB">GPU Accelerated</text>

  <!-- Arrow -->
  <text x="810" y="610" font-family="Arial, sans-serif" font-size="12" fill="#90CAF9">HTTP</text>
  <line x1="780" y1="620" x2="850" y2="620" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="848,615 858,620 848,625" fill="#90CAF9"/>
  <line x1="850" y1="620" x2="780" y2="620" stroke="#A5D6A7" stroke-width="2" stroke-dasharray="4,2" transform="translate(0,12)"/>

  <!-- Flutter box -->
  <rect x="860" y="565" width="180" height="110" rx="10" fill="#5C6BC0" stroke="#7986CB" stroke-width="1"/>
  <text x="950" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Flutter App</text>
  <text x="950" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C5CAE9">Image Capture</text>
  <text x="950" y="636" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C5CAE9">API Request</text>
  <text x="950" y="654" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C5CAE9">BBox Visualization</text>

</svg>